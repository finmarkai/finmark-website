[build]
  command = "npm run build"
  publish = "dist"

# Welcome all crawlers (including AI bots like GPTBot / ClaudeBot / PerplexityBot)
# and ship the baseline security headers enterprise checklists look for.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "all"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
